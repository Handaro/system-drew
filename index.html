<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[ System ] · Hunter Drew</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#000a14;--panel:#020f1e;--panel2:#030d1a;
  --blue:#00aaff;--blue2:#0066cc;--blue-glow:rgba(0,170,255,0.15);
  --blue-line:rgba(0,170,255,0.4);--blue-bright:#55ccff;
  --inner:#001428;--text:#e8f4ff;--text2:#6aaad4;--text3:#2a5a80;
  --green:#00ffaa;--green2:rgba(0,255,170,0.2);
  --red:#ff3355;--red2:rgba(255,51,85,0.2);
  --amber:#ffaa00;--amber2:rgba(255,170,0,0.15);
  --purple:#aa55ff;--purple2:rgba(170,85,255,0.15);
  --shadow-c:#cc44ff;
  --mono:'Courier New',Courier,monospace;
  --orb:'Arial Black','Arial Bold',Arial,sans-serif;
  --raj:'Arial',sans-serif;
}
html,body{min-height:100vh;background:var(--void);font-family:var(--mono);color:var(--text);display:flex;justify-content:center;padding:40px 20px 80px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(0,100,200,0.12) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 50% 100%,rgba(0,60,120,0.08) 0%,transparent 60%);pointer-events:none;z-index:0;}
#root{width:100%;max-width:1400px;position:relative;z-index:1;}

/* Frame */
.frame{position:relative;border:1px solid var(--blue);background:var(--panel);overflow:visible;}
.frame::before{content:'';position:absolute;inset:4px;border:1px solid rgba(0,170,255,0.2);pointer-events:none;z-index:0;}
.frame::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 30px rgba(0,170,255,0.25),inset 0 0 30px rgba(0,170,255,0.05);pointer-events:none;z-index:0;}
.cb{position:absolute;width:24px;height:24px;z-index:2;}
.cb::before,.cb::after{content:'';position:absolute;background:var(--blue);}
.cb::before{width:100%;height:2px;}.cb::after{width:2px;height:100%;}
.cb.tl{top:-2px;left:-2px;}.cb.tl::before{top:0;left:0;}.cb.tl::after{top:0;left:0;}
.cb.tr{top:-2px;right:-2px;}.cb.tr::before{top:0;right:0;}.cb.tr::after{top:0;right:0;}
.cb.bl{bottom:-2px;left:-2px;}.cb.bl::before{bottom:0;left:0;}.cb.bl::after{bottom:0;left:0;}
.cb.br{bottom:-2px;right:-2px;}.cb.br::before{bottom:0;right:0;}.cb.br::after{bottom:0;right:0;}
.frame-inner{padding:40px 50px;position:relative;z-index:1;}
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:2;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);}

/* Header */
.hdr{text-align:center;padding-bottom:32px;margin-bottom:36px;position:relative;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.hdr-sys{font-family:var(--orb);font-size:11px;letter-spacing:8px;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:10px;}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);opacity:0;transition:opacity 0.3s;}
.save-dot.show{opacity:1;}
.hdr-name{font-family:var(--orb);font-size:48px;font-weight:900;color:#fff;letter-spacing:8px;line-height:1;text-shadow:0 0 20px rgba(0,170,255,0.5),0 0 40px rgba(0,170,255,0.2);margin-bottom:10px;}
.hdr-day{font-size:11px;color:var(--text2);letter-spacing:6px;margin-bottom:18px;}
.rank-wrap{display:flex;align-items:center;justify-content:center;gap:0;}
.rank-deco{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--blue));}
.rank-deco.r{background:linear-gradient(90deg,var(--blue),transparent);}
.rank-badge{padding:8px 28px;border:1px solid var(--blue);border-left:none;border-right:none;color:var(--blue-bright);font-family:var(--orb);font-size:12px;font-weight:600;letter-spacing:5px;background:rgba(0,170,255,0.08);position:relative;}
.rank-badge::before,.rank-badge::after{content:'◆';position:absolute;top:50%;transform:translateY(-50%);color:var(--blue);font-size:8px;}
.rank-badge::before{left:-14px;}.rank-badge::after{right:-14px;}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-box{border:1px solid var(--blue-line);background:var(--inner);padding:20px 12px;text-align:center;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.stat-lbl{font-family:var(--orb);font-size:10px;color:var(--text3);letter-spacing:4px;margin-bottom:8px;}
.stat-val{font-family:var(--orb);font-size:48px;font-weight:900;color:var(--blue-bright);line-height:1;text-shadow:0 0 15px rgba(0,170,255,0.4);}
.stat-name{font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:2px;}

/* XP Bar */
.xp-wrap{border:1px solid var(--blue-line);background:var(--inner);padding:16px 24px;margin-bottom:32px;position:relative;}
.xp-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.xp-top{display:flex;justify-content:space-between;font-family:var(--orb);font-size:10px;color:var(--text2);letter-spacing:3px;margin-bottom:10px;}
.xp-track{height:8px;background:rgba(0,100,200,0.15);border:1px solid rgba(0,170,255,0.25);position:relative;overflow:hidden;}
.xp-track::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 10px,rgba(0,170,255,0.05) 10px,rgba(0,170,255,0.05) 11px);}
.xp-fill{height:100%;background:linear-gradient(90deg,#0055aa,var(--blue),var(--blue-bright));transition:width 0.6s ease;position:relative;}
.xp-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;background:white;opacity:0.6;}
.xp-bot{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:8px;letter-spacing:2px;}

/* Flash */
.flash{border:1px solid;padding:12px 20px;font-size:11px;margin-bottom:28px;display:flex;align-items:center;gap:12px;letter-spacing:1px;}
.flash.ok{border-color:rgba(0,255,170,0.4);color:var(--green);background:var(--green2);}
.flash.bad{border-color:rgba(255,51,85,0.4);color:var(--red);background:var(--red2);}
.flash.info{border-color:var(--blue-line);color:var(--blue-bright);background:var(--blue-glow);}

/* Section headers */
.sec{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-family:var(--orb);font-size:11px;font-weight:600;letter-spacing:4px;}
.sec.req{color:var(--blue-bright);}.sec.bon{color:var(--amber);}.sec.spec{color:var(--purple);}.sec.boss{color:var(--shadow-c);}
.sec-line{flex:1;height:1px;}
.sec.req .sec-line{background:linear-gradient(90deg,var(--blue-line),transparent);}
.sec.bon .sec-line{background:linear-gradient(90deg,rgba(255,170,0,0.4),transparent);}
.sec.spec .sec-line{background:linear-gradient(90deg,rgba(170,85,255,0.4),transparent);}
.sec.boss .sec-line{background:linear-gradient(90deg,rgba(200,68,255,0.4),transparent);}
.chip{font-family:var(--mono);font-size:9px;padding:2px 10px;border:1px solid;letter-spacing:2px;}
.sec.req .chip{border-color:var(--blue-line);color:var(--text2);}
.sec.bon .chip{border-color:rgba(255,170,0,0.4);color:var(--amber);}
.sec.spec .chip{border-color:rgba(170,85,255,0.4);color:var(--purple);}
.sec.boss .chip{border-color:rgba(200,68,255,0.4);color:var(--shadow-c);}

.prog-bar{height:2px;margin-bottom:16px;background:rgba(0,170,255,0.1);}
.prog-fill{height:100%;background:var(--blue);transition:width 0.4s;}
.q-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}

/* Quest items */
.q-item{border:1px solid rgba(0,170,255,0.2);background:var(--inner);padding:16px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s,background 0.2s;user-select:none;}
.q-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--blue);opacity:0;transition:opacity 0.2s;}
.q-item:hover{border-color:rgba(0,170,255,0.5);background:rgba(0,30,60,0.8);}
.q-item:hover::before{opacity:1;}
.q-item.done{opacity:0.45;border-color:rgba(0,255,170,0.2);}
.q-item.done::before{background:var(--green);opacity:1;}
.q-item.done .q-name{text-decoration:line-through;color:var(--text3);}
.q-item.bon{border-color:rgba(255,170,0,0.2);background:rgba(20,12,0,0.8);}
.q-item.bon::before{background:var(--amber);}
.q-item.bon:hover{border-color:rgba(255,170,0,0.5);}
.q-item.dc{border-color:rgba(170,85,255,0.25);background:rgba(15,5,30,0.9);}
.q-item.dc::before{background:var(--purple);}
.q-item.dc:hover{border-color:rgba(170,85,255,0.55);}
.q-item.bq{border-color:rgba(200,68,255,0.3);background:rgba(20,0,30,0.9);}
.q-item.bq::before{background:var(--shadow-c);}
.q-item.bq:hover{border-color:rgba(200,68,255,0.6);}
.q-item.shq{border-color:rgba(100,50,180,0.2);background:rgba(5,0,15,0.9);}
.q-item.shq::before{background:rgba(100,50,180,0.5);}
.q-check{width:22px;height:22px;border:1px solid rgba(0,170,255,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;}
.q-item.bon .q-check{border-color:rgba(255,170,0,0.4);}
.q-item.dc .q-check{border-color:rgba(170,85,255,0.4);}
.q-item.bq .q-check{border-color:rgba(200,68,255,0.4);}
.q-item.shq .q-check{border-color:rgba(100,50,180,0.25);}
.q-item.done .q-check{border-color:var(--green);color:var(--green);}
.q-name{font-family:var(--raj);font-size:17px;font-weight:600;flex:1;letter-spacing:1px;color:var(--text);}
.q-item.bon .q-name{color:#ffd870;}
.q-item.dc .q-name{color:#cc99ff;}
.q-item.bq .q-name{color:#ee99ff;}
.q-item.shq .q-name{color:#443366;}
.q-sub{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.5px;}
.q-item.bon .q-sub{color:#7a5a10;}
.q-item.dc .q-sub{color:#5a3a88;}
.q-item.bq .q-sub{color:#602070;}
.q-item.shq .q-sub{color:#1a0a2a;}
.q-xp{font-family:var(--orb);font-size:14px;font-weight:700;white-space:nowrap;}
.q-xp.up{color:var(--green);text-shadow:0 0 8px rgba(0,255,170,0.4);}
.q-xp.ba{color:var(--amber);text-shadow:0 0 8px rgba(255,170,0,0.3);}
.q-xp.bp{color:var(--purple);text-shadow:0 0 8px rgba(170,85,255,0.3);}
.q-xp.bs{color:var(--shadow-c);text-shadow:0 0 8px rgba(200,68,255,0.3);}
.q-xp.bh{color:#221133;}
.boss-prog-track{height:2px;background:rgba(200,68,255,0.15);margin-top:6px;}
.boss-prog-fill{height:100%;background:var(--shadow-c);transition:width 0.4s;}
.boss-days{font-size:9px;color:var(--shadow-c);letter-spacing:3px;margin-top:4px;}

/* Violations */
.vio-hdr{display:flex;align-items:center;gap:12px;font-family:var(--orb);font-size:11px;font-weight:600;color:var(--red);letter-spacing:4px;margin-bottom:14px;}
.vio-hdr-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,51,85,0.4),transparent);}
.v-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
.v-item{border:1px solid rgba(255,51,85,0.2);background:rgba(20,0,5,0.8);padding:16px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s;user-select:none;}
.v-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--red);opacity:0;transition:opacity 0.2s;}
.v-item:hover{border-color:rgba(255,51,85,0.5);}
.v-item:hover::before{opacity:1;}
.v-item.used{opacity:0.25;pointer-events:none;}
.v-ico{width:36px;height:36px;border:1px solid rgba(255,51,85,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--red);font-size:16px;}
.v-name{font-family:var(--raj);font-size:17px;font-weight:600;color:#ffaaaa;letter-spacing:1px;}
.v-sub{font-size:10px;color:#5a1a22;margin-top:3px;}
.v-pen{font-family:var(--orb);font-size:14px;font-weight:700;color:var(--red);margin-left:auto;white-space:nowrap;text-shadow:0 0 8px rgba(255,51,85,0.4);}

/* Divider */
.div-line{height:1px;margin:28px 0;background:linear-gradient(90deg,transparent,var(--blue-line),transparent);position:relative;}
.div-line::before{content:'◆';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--blue);font-size:8px;background:var(--panel);padding:0 8px;}

/* Footer */
.ftr{display:flex;justify-content:space-between;align-items:center;padding-top:24px;margin-top:16px;position:relative;}
.ftr::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue-line),transparent);}
.streak-wrap{display:flex;align-items:center;gap:14px;}
.streak-lbl{font-family:var(--orb);font-size:10px;color:var(--text3);letter-spacing:4px;}
.streak-val{font-family:var(--orb);font-size:44px;font-weight:900;color:var(--amber);text-shadow:0 0 20px rgba(255,170,0,0.4);line-height:1;}
.streak-days{font-family:var(--orb);font-size:10px;color:var(--text3);letter-spacing:3px;align-self:flex-end;margin-bottom:4px;}
.btn-row{display:flex;gap:12px;}
.btn{padding:10px 28px;font-family:var(--orb);font-size:10px;letter-spacing:3px;border:1px solid;background:transparent;cursor:pointer;position:relative;overflow:hidden;transition:all 0.2s;}
.btn::before{content:'◆';position:absolute;left:10px;top:50%;transform:translateY(-50%) scale(0);font-size:7px;transition:transform 0.2s;}
.btn:hover::before{transform:translateY(-50%) scale(1);}
.btn-reset{border-color:var(--blue-line);color:var(--text3);}
.btn-reset:hover{border-color:var(--blue);color:var(--blue-bright);background:var(--blue-glow);}
.btn-end{border-color:rgba(255,51,85,0.4);color:var(--red);}
.btn-end:hover{border-color:var(--red);background:var(--red2);}
.debuff{font-family:var(--orb);font-size:9px;color:var(--red);border:1px solid rgba(255,51,85,0.4);padding:5px 14px;letter-spacing:3px;}

/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,5,12,0.92);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.35s;}
.overlay.show{opacity:1;pointer-events:all;}
.ov-box{position:relative;max-width:560px;width:92%;border:1px solid var(--blue);background:var(--panel);padding:52px 60px;text-align:center;}
.ov-box::before{content:'';position:absolute;inset:6px;border:1px solid rgba(0,170,255,0.15);pointer-events:none;}
.ov-box::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 40px rgba(0,170,255,0.3),inset 0 0 40px rgba(0,170,255,0.05);pointer-events:none;}
.ov-box.pen{border-color:var(--red);}
.ov-box.pen::after{box-shadow:0 0 40px rgba(255,51,85,0.3),inset 0 0 40px rgba(255,51,85,0.05);}
.ov-box.shad{border-color:var(--purple);}
.ov-box.shad::after{box-shadow:0 0 40px rgba(170,85,255,0.3),inset 0 0 40px rgba(170,85,255,0.05);}
.ov-box.boss-win{border-color:var(--shadow-c);}
.ov-box.boss-win::after{box-shadow:0 0 40px rgba(200,68,255,0.3),inset 0 0 40px rgba(200,68,255,0.05);}
.ov-notif{font-family:var(--orb);font-size:10px;letter-spacing:6px;color:var(--blue-bright);margin-bottom:24px;}
.ov-box.pen .ov-notif{color:var(--red);}
.ov-box.shad .ov-notif{color:var(--purple);}
.ov-box.boss-win .ov-notif{color:var(--shadow-c);}
.ov-deco{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
.ov-deco-line{width:60px;height:1px;background:var(--blue);}
.ov-box.pen .ov-deco-line{background:var(--red);}
.ov-box.shad .ov-deco-line{background:var(--purple);}
.ov-box.boss-win .ov-deco-line{background:var(--shadow-c);}
.ov-diamond{width:10px;height:10px;border:2px solid var(--blue);transform:rotate(45deg);}
.ov-box.pen .ov-diamond{border-color:var(--red);}
.ov-box.shad .ov-diamond{border-color:var(--purple);}
.ov-box.boss-win .ov-diamond{border-color:var(--shadow-c);}
.ov-rank{font-family:var(--orb);font-size:32px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:12px;text-shadow:0 0 20px rgba(0,170,255,0.5);}
.ov-box.pen .ov-rank{text-shadow:0 0 20px rgba(255,51,85,0.5);}
.ov-box.shad .ov-rank{text-shadow:0 0 20px rgba(170,85,255,0.5);}
.ov-box.boss-win .ov-rank{text-shadow:0 0 20px rgba(200,68,255,0.5);}
.ov-sub{font-family:var(--mono);font-size:11px;color:var(--text2);letter-spacing:3px;margin-bottom:36px;}
.ov-btn{padding:12px 44px;border:1px solid var(--blue);background:rgba(0,100,200,0.1);color:var(--blue-bright);font-family:var(--orb);font-size:10px;letter-spacing:4px;cursor:pointer;transition:all 0.2s;}
.ov-btn:hover{background:rgba(0,170,255,0.2);box-shadow:0 0 20px rgba(0,170,255,0.2);}
.ov-box.pen .ov-btn{border-color:var(--red);color:var(--red);background:rgba(255,51,85,0.1);}
.ov-box.shad .ov-btn{border-color:var(--purple);color:var(--purple);background:rgba(170,85,255,0.1);}
.ov-box.boss-win .ov-btn{border-color:var(--shadow-c);color:var(--shadow-c);background:rgba(200,68,255,0.1);}

/* Loot overlay */
.loot-overlay{position:fixed;inset:0;background:rgba(0,5,12,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.35s;}
.loot-overlay.show{opacity:1;pointer-events:all;}
.loot-box{position:relative;max-width:500px;width:92%;border:1px solid var(--blue);background:var(--panel);padding:44px 52px;text-align:center;}
.loot-box::before{content:'';position:absolute;inset:6px;border:1px solid rgba(0,170,255,0.15);pointer-events:none;}
.loot-box.common{border-color:#888;}.loot-box.uncommon{border-color:#00cc66;}.loot-box.rare{border-color:#0088ff;}.loot-box.epic{border-color:#aa44ff;}.loot-box.legendary{border-color:#ffaa00;}
.loot-box.common::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 20px rgba(136,136,136,0.2);pointer-events:none;}
.loot-box.uncommon::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 30px rgba(0,204,102,0.25);pointer-events:none;}
.loot-box.rare::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 35px rgba(0,136,255,0.3);pointer-events:none;}
.loot-box.epic::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 40px rgba(170,68,255,0.35);pointer-events:none;}
.loot-box.legendary::after{content:'';position:absolute;inset:-1px;box-shadow:0 0 50px rgba(255,170,0,0.4);pointer-events:none;}
.loot-src{font-family:var(--orb);font-size:9px;letter-spacing:5px;margin-bottom:16px;}
.loot-box.common .loot-src{color:#888;}.loot-box.uncommon .loot-src{color:#00cc66;}.loot-box.rare .loot-src{color:#0088ff;}.loot-box.epic .loot-src{color:#aa44ff;}.loot-box.legendary .loot-src{color:#ffaa00;}
.loot-tier-badge{display:inline-block;padding:3px 16px;border:1px solid;font-family:var(--orb);font-size:9px;letter-spacing:4px;margin-bottom:20px;}
.loot-box.common .loot-tier-badge{border-color:#888;color:#aaa;background:rgba(136,136,136,0.08);}
.loot-box.uncommon .loot-tier-badge{border-color:#00cc66;color:#00cc66;background:rgba(0,204,102,0.08);}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function xpFor(l) { return Math.round(100 * Math.pow(l, 1.3)); }
function getRank(l) { let r = RANKS[0]; for (const x of RANKS) if (l >= x.minL) r = x; return r; }
function todayStr() { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }
function daysBetween(a, b) { return Math.max(0, Math.floor((new Date(b) - new Date(a)) / 86400000)); }
function seededRand(seed, max) { let x = Math.sin(seed+1)*10000; return Math.floor((x - Math.floor(x)) * max); }
function dateSeed() { const p = todayStr().split('-'); return parseInt(p[0])*10000+parseInt(p[1])*100+parseInt(p[2]); }
function getDailyChallenge() { return CHALLENGE_POOL[seededRand(dateSeed(), CHALLENGE_POOL.length)]; }
function getBossForLevel(lvl) { return BOSS_POOL[Math.floor((lvl-1)/5) % BOSS_POOL.length]; }
function isSunday() { return new Date().getDay() === 0; }
function getWeekNum(d) {
  const s = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  s.setUTCDate(s.getUTCDate() + 4 - (s.getUTCDay() || 7));
  const y = new Date(Date.UTC(s.getUTCFullYear(), 0, 1));
  return Math.ceil((((s - y) / 86400000) + 1) / 7);
}
function getGateKey() { const d = new Date(); return d.getFullYear() + '-W' + getWeekNum(d); }
function getRGKey()   { const d = new Date(); return 'rg-' + d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate(); }

function rollLoot(minTier) {
  const tiers = ['common','uncommon','rare','epic','legendary'];
  const minIdx = tiers.indexOf(minTier) || 0;
  const pool = tiers.slice(minIdx);
  const weights = pool.map(t => TIER_WEIGHTS[t]);
  const total = weights.reduce((a, b) => a + b, 0);
  let rand = Math.random() * total;
  let tier = pool[pool.length - 1];
  for (let i = 0; i < pool.length; i++) { rand -= weights[i]; if (rand <= 0) { tier = pool[i]; break; } }
  const items = LOOT_TABLE[tier];
  return items[Math.floor(Math.random() * items.length)];
}

  const [text, setText] = useState('');
  const [shake, setShake] = useState(false);
  if (!item) return null;
  const handleConfirm = () => {
    if (!text.trim()) { setShake(true); setTimeout(()=>setShake(false),1500); return; }
    onConfirm(text.trim());
    setText('');
  };
  return (
    <div className={`proof-modal${show?' show':''}`}>
      <div className="proof-box">
        <Corners/>
        <div className="proof-title">[ ITEM ACTIVATION ]</div>

  );

  const rankLabel = getRank(state.level).label;
  const gate      = GATE_RANKS[rankLabel] || GATE_RANKS['E-RANK HUNTER'];
  const cleared   = state.gateWeek === getGateKey() && state.gateCleared;
  const broken    = state.gateWeek === getGateKey() && state.gateBroken;
  const active    = isSundayNow && !cleared && !broken;
  const roomsDone = state.gateRoomsDone || [];
  const allRooms  = roomsDone.length >= gate.rooms.length;

  let headerCls = 'inactive', chipText = 'OPENS SUNDAY';
  let chipStyle = {borderColor:'rgba(100,100,120,0.3)', color:'var(--text3)'};

  else if (active)  { headerCls='gate-open'; chipText='GATE OPEN'; chipStyle={borderColor:'rgba(0,255,170,0.5)',color:'var(--green)'}; }

  return (
    <div className="gate-wrap">
      <div className={`gate-header ${headerCls}`} onClick={()=>setOpen(o=>!o)}>
        <i className="ti ti-door-enter" style={{fontSize:16}}/>
        DIMENSIONAL GATE
        <span className="gate-chip" style={chipStyle}>{chipText}</span>
        <div className="gate-hdr-line"/>
        <i className={`ti ti-chevron-down inv-toggle-arrow${open?' open':''}`}/>
      </div>
      <div className={`gate-panel${open?' open':''}`}>
        {!isSundayNow && !cleared && !broken ? (
          <div className="gate-card inactive-card">
            <div className="gate-sunday-note">◆ &nbsp; THE GATE OPENS ON SUNDAY &nbsp; ◆<br/><br/>Prepare yourself, Hunter. The dungeon waits.</div>
          </div>
        ) : (
          <div className={`gate-card${cleared?' cleared':broken?' broken':''}`}>
            <div className="gate-rank-row">
              <div className="gate-rank-icon">{gate.rank}</div>
              <div>
                <div className="gate-title">{rankLabel.replace(' HUNTER','')} GATE</div>
                <div className="gate-subtitle">DIMENSIONAL DUNGEON  ◆  SUNDAY RAID</div>
              </div>
              <div className={`gate-status-badge ${cleared?'status-cleared':broken?'status-broken':active?'status-open':'status-waiting'}`}>
                {cleared?'CLEARED':broken?'BROKEN':active?'GATE OPEN':'WAITING'}
              </div>
            </div>
            <div className="gate-rooms">
              {gate.rooms.map((room,i) => {
                const done   = roomsDone.includes(i);
                const locked = !active || (!done && i > 0 && !roomsDone.includes(i-1));
                return (
                  <div key={i} className={`gate-room${done?' room-done':''}${locked&&!done?' locked':''}`}
                    onClick={()=>!locked&&!done&&onCompleteRoom(i)}>
                    <div className="room-num">{done?<i className="ti ti-check" style={{fontSize:12}}/>:(i+1)}</div>
                    <div style={{flex:1}}><div className="room-name">{room.name}</div><div className="room-sub">{room.sub}</div></div>
                    <div className="room-xp">+{room.xp} XP</div>
                  </div>
                );
              })}
            </div>
            <div className={`gate-boss-row${!active||!allRooms?' boss-locked':''}${cleared?' boss-done':''}`}
              onClick={()=>active&&allRooms&&!cleared&&onDefeatBoss()}>
              <div className="boss-skull"><i className="ti ti-skull" style={{fontSize:18}}/></div>
              <div style={{flex:1}}><div className="boss-name">{gate.boss.name}</div><div className="boss-sub-text">{gate.boss.sub}</div></div>
              <div className="boss-xp">+{gate.boss.xp} XP</div>
            </div>
            <div className="gate-note" style={cleared?{color:'var(--amber)'}:broken?{color:'var(--red)'}:{}}>
              {cleared?'◆  GATE CLEARED — SEE YOU NEXT SUNDAY, HUNTER  ◆'
                :broken?'◆  GATE BROKEN — THE DUNGEON COLLAPSED  ◆'
                :active?'◆  COMPLETE ALL ROOMS TO FACE THE BOSS  ◆'
                :'◆  GATE WAITING  ◆'}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function RedGateSection({state, onCompleteRoom, onDefeatBoss, onFail}) {
  const [open, setOpen] = useState(true);
  const rg = RED_GATE_POOL.find(r => r.id === state.rgId);
  if (!rg || state.rgKey !== getRGKey()) return null;
  const roomsDone = state.rgRoomsDone || [];
  const allDone   = roomsDone.length >= rg.rooms.length;
  return (
    <div>
      <div className="gate-header" style={{borderTopColor:'rgba(255,51,85,0.4)',color:'var(--red)',animation:'gate-pulse 1.5s ease-in-out infinite'}}
        onClick={()=>setOpen(o=>!o)}>
        <i className="ti ti-alert-triangle" style={{fontSize:16}}/>
        RED GATE — INSTANT DUNGEON
        <span className="gate-chip" style={{borderColor:'rgba(255,51,85,0.5)',color:'var(--red)'}}>MUST CLEAR</span>
        <div className="gate-hdr-line" style={{background:'linear-gradient(90deg,rgba(255,51,85,0.5),transparent)'}}/>
        <i className={`ti ti-chevron-down inv-toggle-arrow${open?' open':''}`}/>
      </div>
      <div className={`gate-panel${open?' open':''}`}>
        <div className="red-gate-card">
          <div className="red-gate-title-row">
            <div className="red-gate-icon">{rg.icon}</div>
            <div style={{flex:1}}><div className="red-gate-name">{rg.name}</div></div>
            {state.rgCleared
              ? <div className="gate-status-badge status-cleared">ESCAPED</div>
              : state.rgFailed
              ? <div className="gate-status-badge status-broken">FAILED</div>
              : <div className="gate-status-badge status-broken" style={{animation:'gate-pulse 1s ease-in-out infinite'}}>TRAPPED</div>}
          </div>
          <div className="red-gate-flavor">{rg.flavor}</div>
          {!state.rgCleared && !state.rgFailed && (
            <div className="red-gate-deadline">
              <i className="ti ti-alert-triangle" style={{fontSize:14}}/>
              YOU ARE TRAPPED — CLEAR THIS DUNGEON TODAY OR SUFFER THE CONSEQUENCES
            </div>
          )}
          {rg.rooms.map((room,i) => {
            const done    = roomsDone.includes(i);
            const locked  = !done && i > 0 && !roomsDone.includes(i-1);
            const canClick= !state.rgCleared && !state.rgFailed && !done && !locked;
            return (
              <div key={i} className={`red-gate-room${done?' done':''}${locked?' rg-locked':''}`}
                onClick={()=>canClick&&onCompleteRoom(i)}>
                <div className="rg-room-num">{done?<i className="ti ti-check" style={{fontSize:12,color:'var(--amber)'}}/>:(i+1)}</div>
                <div style={{flex:1}}><div className="rg-room-name">{room.name}</div><div className="rg-room-sub">{room.sub}</div></div>
                <div className="rg-room-xp">+{room.xp} XP</div>
              </div>
            );
          })}
          <div className={`red-gate-room${state.rgCleared?' done':''}${(!allDone||state.rgCleared||state.rgFailed)?' rg-locked':''}`}
            style={{borderColor:'rgba(255,51,85,0.4)',background:'rgba(40,0,8,0.9)',marginBottom:0}}
            onClick={()=>allDone&&!state.rgCleared&&!state.rgFailed&&onDefeatBoss()}>
            <div className="rg-room-num" style={{borderColor:'rgba(255,51,85,0.5)',color:'var(--red)'}}><i className="ti ti-skull" style={{fontSize:13}}/></div>
            <div style={{flex:1}}><div className="rg-room-name" style={{color:'#ffaaaa'}}>{rg.boss.name}</div><div className="rg-room-sub">{rg.boss.sub}</div></div>
            <div className="rg-room-xp" style={{color:'var(--red)'}}>+{rg.boss.xp} XP</div>
          </div>
          {state.rgCleared
            ? <div className="rg-cleared-note" style={{marginTop:16}}>◆  YOU ESCAPED THE DUNGEON  ◆</div>
            : state.rgFailed
            ? <div className="rg-failed-note" style={{marginTop:16}}>◆  THE DUNGEON COLLAPSED — IT CLAIMED ITS PRICE  ◆</div>
            : <div className="red-gate-penalty" style={{marginTop:16}}>
                <i className="ti ti-alert-triangle" style={{fontSize:12,verticalAlign:'-2px'}}/> &nbsp;
                FAIL TO CLEAR TODAY: −{rg.penalty} XP + STREAK RESET &nbsp;<br/><br/>
                <span style={{cursor:'pointer',color:'var(--red)',letterSpacing:2,textDecoration:'underline'}}
                  onClick={onFail}>[ MARK AS FAILED ]</span>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

function InventorySection({inventory, gateActive, onUse}) {
  const [open, setOpen] = useState(false);
  const active = (inventory||[]).filter(i=>!i.used);
  return (
    <>
      <div className="inv-toggle" onClick={()=>setOpen(o=>!o)}>
        <i className="ti ti-backpack" style={{fontSize:16}}/>
        INVENTORY
        <span className="chip" style={{borderColor:'rgba(255,170,0,0.4)',color:'var(--amber)'}}>{active.length} ITEM{active.length!==1?'S':''}</span>
        <div className="inv-toggle-line"/>
        <i className={`ti ti-chevron-down inv-toggle-arrow${open?' open':''}`}/>
      </div>
      <div className={`inv-panel${open?' open':''}`}>
        {!(inventory&&inventory.length) ? (
          <div className="inv-empty">◆ NO ITEMS YET — COMPLETE QUESTS TO EARN LOOT ◆</div>
        ) : (
          <div className="inv-grid">
            {inventory.map((item,idx) => {
              const tierIdx = TIER_ORDER.indexOf(item.tier);
              const blocked = !item.used && gateActive && tierIdx <= 1;
              return (
                <div key={idx} className={`inv-item ${item.tier}${item.used?' consumed':''}`}>
                  <div className="inv-item-qty">{item.used?'USED':'x'+(item.qty||1)}</div>
                  <div className="inv-item-icon">{item.icon}</div>
                  <div className="inv-item-name">{item.name}</div>
                  <div className="inv-item-tier">{item.tier.toUpperCase()}</div>
                  <div className="inv-item-reward">{item.reward}</div>
                  {item.proofLog&&item.proofLog.length>0 && (
                    <div className="inv-proof-log">
                      {item.proofLog.map((p,pi)=>(
                        <div key={pi} className="inv-proof-entry">◆ {p.note} <span style={{color:'var(--text3)'}}>({p.time})</span></div>
                      ))}
                    </div>
                  )}
                  {item.used
                    ? <div className="inv-consumed-label">CONSUMED</div>
                    : blocked
                    ? <div className="inv-blocked">⚠ GATE ACTIVE — UNAVAILABLE</div>
                    : <button className="inv-use-btn" onClick={()=>onUse(idx)}>USE ITEM</button>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [S, setS]         = useState(() => loadState());
  const [saveDot, setSaveDot] = useState(false);
  const [flash, setFlash]  = useState(null);   // {msg, type}
  const [overlay, setOverlay] = useState(null); // {notif,rank,sub,btnText,cls, onClose}
  const [loot, setLoot]    = useState(null);    // {item, source}
  const [lootQ, setLootQ]  = useState([]);      // queued loot to show sequentially
  const [proofItem, setProofItem] = useState(null); // {item, idx}
  const [debuff, setDebuff] = useState(false);
  const flashTimer = useRef(null);
  const saveDotTimer = useRef(null);
  const debuffTimer = useRef(null);

  // Persist on every S change
  useEffect(() => {
    saveState(S);
    setSaveDot(true);
    if (saveDotTimer.current) clearTimeout(saveDotTimer.current);
    saveDotTimer.current = setTimeout(() => setSaveDot(false), 1400);
  }, [S]);

  // On mount: check for missed days, red gate roll
  useEffect(() => {
    const today    = todayStr();
    const lastSeen = localStorage.getItem(DATE_KEY);
    if (!lastSeen) {
      localStorage.setItem(DATE_KEY, today);
    } else if (lastSeen !== today) {
      const missed = daysBetween(lastSeen, today);
      localStorage.setItem(DATE_KEY, today);
      if (missed >= 1) {
        const pen = missed * 40;
        setS(prev => {
          const next = {...prev, streak:0, done:{}, used:{}, day: prev.day + missed};
          next.xp = Math.max(0, next.xp - pen);
          return clampLevels(next);
        });
        showOverlay('[ SYSTEM PENALTY ]', missed===1?'YOU WERE ABSENT':missed+' DAYS MISSED',
          'STREAK RESET  ◆  −'+pen+' XP', 'ACCEPT PUNISHMENT', 'pen');
      } else {
        showFlash('Progress restored — welcome back, Hunter.', 'info');
      }
    } else {
      showFlash('Progress restored — welcome back, Hunter.', 'info');
    }
    // Red gate: only roll if not already rolled today
    const rgKey = getRGKey();
    setS(prev => {
      if (prev.rgKey === rgKey) return prev;
      if (Math.random() > 0.30) return prev;
      const rg = RED_GATE_POOL[Math.floor(Math.random() * RED_GATE_POOL.length)];
      const next = {...prev, rgKey, rgId:rg.id, rgRoomsDone:[], rgCleared:false, rgFailed:false};
      setTimeout(() => {
        showOverlay('[ RED GATE DETECTED ]', rg.name,
          'AN INSTANT DUNGEON HAS APPEARED  ◆  YOU MUST CLEAR IT TODAY',
          'ENTER THE GATE', 'pen');
      }, 1200);
      return next;
    });
  }, []);

  // Process loot queue sequentially
  useEffect(() => {
    if (!loot && lootQ.length > 0) {
      const [next, ...rest] = lootQ;
      setLoot(next);
      setLootQ(rest);
    }
  }, [loot, lootQ]);

  function clampLevels(s) {
    const ns = {...s};
    while (ns.level > 1 && ns.xp < xpFor(ns.level-1)) ns.level--;
    while (ns.xp >= xpFor(ns.level)) ns.level++;
    return ns;
  }

  function showFlash(msg, type) {
    setFlash({msg, type});
    if (flashTimer.current) clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setFlash(null), 4000);
  }

  function showOverlay(notif, rank, sub, btnText, cls, onCloseExtra) {
    setOverlay({notif, rank, sub, btnText, cls, onCloseExtra});
  }

  function closeOverlay() {
    const extra = overlay?.onCloseExtra;
    setOverlay(null);
    if (extra) extra();
  }

  function queueLoot(item, source) {
    setLootQ(q => [...q, {item, source}]);
  }

  function checkLvlUp(prevLevel, newState) {
    if (newState.level > prevLevel) {
      showOverlay('[ SYSTEM NOTIFICATION ]', getRank(newState.level).label,
        'LEVEL ' + newState.level + ' ACHIEVED', 'ACKNOWLEDGE', '');
      const minTier = newState.level >= 50 ? 'epic' : newState.level >= 20 ? 'rare' : newState.level >= 10 ? 'uncommon' : 'common';
      setTimeout(() => queueLoot(rollLoot(minTier), 'LEVEL UP REWARD'), 1800);
      if (newState.level % 5 === 0) {
        const nb = getBossForLevel(newState.level);
        if (nb && newState.boss !== nb.id) {
          setTimeout(() => {
            setS(prev => ({...prev, boss: nb.id, bossProgress: 0}));
            showOverlay('[ BOSS QUEST UNLOCKED ]', nb.name,
              nb.days + '-DAY CHALLENGE · ' + nb.xp + ' XP', 'ACCEPT THE CHALLENGE', 'boss-win');
          }, 2200);
        }
      }
    }
  }

  function checkShadow(tid, ns, scheduleShow) {
    let updated = false;
    SHADOW_POOL.forEach(sh => {
      if (sh.trigger === tid && !ns.shadowDone[sh.id]) {
        ns.shadowDone = {...ns.shadowDone, [sh.id]: true};
        ns.xp += sh.xp;
        updated = true;
        if (scheduleShow) {
          setTimeout(() => showOverlay('[ SHADOW QUEST REVEALED ]', sh.reveal,
            sh.rdesc + ' · +' + sh.xp + ' XP', 'ABSORB THE REWARD', 'shad'), 800);
        }
      }
    });
    return updated;
  }

  function toggleQuest(q) {
    setS(prev => {
      const ns = JSON.parse(JSON.stringify(prev));
      const wasFirst = Object.values(ns.done).filter(Boolean).length === 0 && !ns.done[q.id];
      if (ns.done[q.id]) {
        ns.done[q.id] = false;
        ns.xp = Math.max(0, ns.xp - q.xp);
        ns.stats[q.stat] = Math.max(10, ns.stats[q.stat] - q.v);
        if (ns.questCounts[q.id]) ns.questCounts[q.id] = Math.max(0, ns.questCounts[q.id]-1);
        if (ns.questLoot && ns.questLoot[q.id]) {
          const lootId = ns.questLoot[q.id];
          const idx = ns.inventory.findIndex(i => i.id === lootId);
          if (idx > -1) {
            if (ns.inventory[idx].qty > 1) ns.inventory[idx].qty--;
            else ns.inventory.splice(idx, 1);
          }
          delete ns.questLoot[q.id];
          showFlash('Quest unmarked — −'+q.xp+' XP  ◆  Loot removed', 'bad');
        } else {
          showFlash('Quest unmarked — −'+q.xp+' XP', 'bad');
        }
      } else {
        ns.done[q.id] = true;
        ns.xp += q.xp;
        ns.stats[q.stat] += q.v;
        ns.questCounts[q.id] = (ns.questCounts[q.id] || 0) + 1;
        showFlash('Quest complete — +'+q.xp+' XP  ◆  '+q.stat.toUpperCase()+' +'+q.v, 'ok');
        if (Math.random() < 0.15) {
          const dropped = rollLoot('common');
          if (!ns.questLoot) ns.questLoot = {};
          ns.questLoot[q.id] = dropped.id;
          const existing = ns.inventory.find(i => i.id === dropped.id);
          if (existing) existing.qty = (existing.qty||1)+1;
          else ns.inventory.push({...dropped, qty:1, source:'QUEST DROP'});
          setTimeout(() => queueLoot(dropped, 'QUEST DROP'), 600);
        }
        if (wasFirst)                              checkShadow('firstQuest', ns, true);
        if (q.id==='book' && ns.questCounts['book']>=3)  checkShadow('book3', ns, true);
        if (q.id==='bible'&& ns.questCounts['bible']>=5) checkShadow('bible5', ns, true);
        if (DAILY_Q.every(dq => ns.done[dq.id]))         checkShadow('allDaily', ns, true);
      }
      const prevLevel = prev.level;
      const clamped = clampLevels(ns);
      checkLvlUp(prevLevel, clamped);
      return clamped;
    });
  }

  function toggleChallenge() {
    const ch = getDailyChallenge();
    setS(prev => {
      const ns = {...prev};
      if (ns.challengeDone) {
        ns.challengeDone = false;
        ns.xp = Math.max(0, ns.xp - ch.xp);
        ns.stats = {...ns.stats, [ch.stat]: Math.max(10, ns.stats[ch.stat] - ch.v)};
        showFlash('Challenge unmarked — −'+ch.xp+' XP', 'bad');
      } else {
        ns.challengeDone = true;
        ns.xp += ch.xp;
        ns.stats = {...ns.stats, [ch.stat]: ns.stats[ch.stat] + ch.v};
        showFlash('Daily challenge complete — +'+ch.xp+' XP  ◆  '+ch.stat.toUpperCase()+' +'+ch.v, 'ok');
      }
      const prev2 = prev.level;
      const clamped = clampLevels(ns);
      checkLvlUp(prev2, clamped);
      return clamped;
    });
  }

  function progressBoss() {
    setS(prev => {
      if (!prev.boss) return prev;
      const boss = BOSS_POOL.find(b => b.id === prev.boss);
      if (!boss) return prev;
      const ns = {...prev, bossProgress: prev.bossProgress + 1};
      if (ns.bossProgress >= boss.days) {
        ns.xp += boss.xp;
        ns.stats = {...ns.stats, [boss.stat]: Math.max(1, ns.stats[boss.stat]+boss.v)};
        ns.boss = null; ns.bossProgress = 0;
        const prevLevel = prev.level;
        const clamped = clampLevels(ns);
        setTimeout(() => {
          showOverlay('[ BOSS QUEST COMPLETE ]', boss.name,
            'CHALLENGE CONQUERED · +'+boss.xp+' XP', 'CLAIM REWARD', 'boss-win');
          setTimeout(() => queueLoot(rollLoot('rare'), 'BOSS QUEST REWARD'), 1800);
        }, 400);
        checkLvlUp(prevLevel, clamped);
        return clamped;
      }
      showFlash('Boss progress: '+ns.bossProgress+'/'+boss.days+' days', 'info');
      return ns;
    });
  }

  function triggerViolation(v) {
    setS(prev => {
      if (prev.used[v.id]) return prev;
      const ns = {...prev, used:{...prev.used, [v.id]:true}};
      ns.xp = Math.max(0, ns.xp + v.xp);
      ns.stats = {...ns.stats, [v.stat]: Math.max(1, ns.stats[v.stat] + v.v)};
      setDebuff(true);
      if (debuffTimer.current) clearTimeout(debuffTimer.current);
      debuffTimer.current = setTimeout(() => setDebuff(false), 8000);
      showFlash('Violation logged — '+Math.abs(v.xp)+' XP lost  ◆  '+v.stat.toUpperCase()+' '+v.v, 'bad');
      return clampLevels(ns);
    });
  }

  function completeGateRoom(idx) {
    const rankLabel = getRank(S.level).label;
    const gate = GATE_RANKS[rankLabel] || GATE_RANKS['E-RANK HUNTER'];
    setS(prev => {
      const ns = JSON.parse(JSON.stringify(prev));
      const done = ns.gateRoomsDone || [];
      if (done.includes(idx)) return prev;
      if (idx > 0 && !done.includes(idx-1)) { showFlash('Complete the previous room first, Hunter.','bad'); return prev; }
      ns.gateRoomsDone = [...done, idx];
      const room = gate.rooms[idx];
      ns.xp += room.xp; ns.stats[room.stat] = Math.max(1, ns.stats[room.stat]+room.v);
      showFlash('Room cleared — +'+room.xp+' XP  ◆  '+room.stat.toUpperCase()+' +'+room.v, 'ok');
      if (Math.random() < 0.25) setTimeout(() => queueLoot(rollLoot('common'),'GATE ROOM DROP'), 600);
      const pL = prev.level; const clamped = clampLevels(ns); checkLvlUp(pL, clamped);
      return clamped;
    });
  }

  function defeatGateBoss() {
    const rankLabel = getRank(S.level).label;
    const gate = GATE_RANKS[rankLabel] || GATE_RANKS['E-RANK HUNTER'];
    const roomsDone = S.gateRoomsDone || [];
    if (roomsDone.length < gate.rooms.length) { showFlash('Clear all rooms before facing the boss.','bad'); return; }
    setS(prev => {
      const ns = {...prev};
      ns.xp += gate.boss.xp; ns.stats = {...ns.stats, [gate.boss.stat]: Math.max(1, ns.stats[gate.boss.stat]+gate.boss.v)};
      ns.gateCleared = true; ns.gateWeek = getGateKey();
      const pL = prev.level; const clamped = clampLevels(ns); checkLvlUp(pL, clamped);
      setTimeout(() => {
        showOverlay('[ GATE CLEARED ]', gate.boss.name, 'GATE CONQUERED  ◆  +'+gate.boss.xp+' XP', 'CLAIM VICTORY', 'boss-win');
        setTimeout(() => queueLoot(rollLoot(gate.loot), 'GATE BOSS REWARD'), 2200);
      }, 400);
      return clamped;
    });
  }

  function completeRGRoom(idx) {
    const rg = RED_GATE_POOL.find(r => r.id === S.rgId);
    if (!rg || S.rgCleared || S.rgFailed) return;
    setS(prev => {
      const ns = JSON.parse(JSON.stringify(prev));
      const done = ns.rgRoomsDone || [];
      if (done.includes(idx)) return prev;
      if (idx > 0 && !done.includes(idx-1)) { showFlash('Complete the previous room first.','bad'); return prev; }
      ns.rgRoomsDone = [...done, idx];
      const room = rg.rooms[idx];
      ns.xp += room.xp; ns.stats[room.stat] = Math.max(1, ns.stats[room.stat]+room.v);
      showFlash('Room cleared — +'+room.xp+' XP  ◆  '+room.stat.toUpperCase()+' +'+room.v, 'ok');
      const pL = prev.level; const clamped = clampLevels(ns); checkLvlUp(pL, clamped);
      return clamped;
    });
  }

  function defeatRGBoss() {
    const rg = RED_GATE_POOL.find(r => r.id === S.rgId);
    if (!rg || S.rgCleared || S.rgFailed) return;
    if ((S.rgRoomsDone||[]).length < rg.rooms.length) { showFlash('Clear all rooms first, Hunter.','bad'); return; }
    setS(prev => {
      const ns = {...prev};
      ns.xp += rg.boss.xp; ns.stats = {...ns.stats, [rg.boss.stat]: Math.max(1, ns.stats[rg.boss.stat]+rg.boss.v)};
      ns.rgCleared = true;
      const pL = prev.level; const clamped = clampLevels(ns); checkLvlUp(pL, clamped);
      setTimeout(() => {
        showOverlay('[ INSTANT DUNGEON CLEARED ]', rg.boss.name, 'YOU ESCAPED  ◆  +'+rg.boss.xp+' XP', 'CLAIM VICTORY', 'boss-win');
        setTimeout(() => queueLoot(rollLoot(rg.loot), 'RED GATE REWARD'), 2200);
      }, 400);
      return clamped;
    });
  }

  function failRedGate() {
    const rg = RED_GATE_POOL.find(r => r.id === S.rgId);
    if (!rg || S.rgCleared || S.rgFailed) return;
    setS(prev => {
      const ns = {...prev, rgFailed:true, streak:0};
      ns.xp = Math.max(0, ns.xp - rg.penalty);
      return clampLevels(ns);
    });
    showOverlay('[ GATE BREAK — INSTANT DUNGEON ]', rg.name,
      'DUNGEON COLLAPSED  ◆  −'+rg.penalty+' XP  ◆  STREAK RESET', 'FACE THE CONSEQUENCE', 'pen');
  }

  function endDay() {
    const missed = DAILY_Q.filter(q => !S.done[q.id]);
    if (missed.length) {
      const pen = missed.length * 10;
      setS(prev => {
        const ns = {...prev, challengeDone:false, done:{}, used:{}, day:prev.day+1};
        ns.xp = Math.max(0, ns.xp - pen);
        return clampLevels(ns);
      });
      showFlash('Day ended — '+missed.length+' missed  ◆  −'+pen+' XP', 'bad');
    } else {
      setS(prev => {
        const ns = {...prev, challengeDone:false, done:{}, used:{}, day:prev.day+1, streak:prev.streak+1};
        // check cleanDay shadow
        const nsCopy = JSON.parse(JSON.stringify(ns));
        if (Object.keys(prev.used).length === 0) checkShadow('cleanDay', nsCopy, true);
        return {...ns, shadowDone: nsCopy.shadowDone, xp: nsCopy.xp};
      });
      showFlash('All obligations met — day complete!', 'ok');
    }
    localStorage.setItem(DATE_KEY, todayStr());
    // Red gate roll for next day
    const rgKey = getRGKey();
    setS(prev => {
      if (prev.rgKey === rgKey) return prev;
      if (Math.random() > 0.30) return prev;
      const rg = RED_GATE_POOL[Math.floor(Math.random() * RED_GATE_POOL.length)];
      const next = {...prev, rgKey, rgId:rg.id, rgRoomsDone:[], rgCleared:false, rgFailed:false};
      setTimeout(() => showOverlay('[ RED GATE DETECTED ]', rg.name,
        'AN INSTANT DUNGEON HAS APPEARED  ◆  YOU MUST CLEAR IT TODAY', 'ENTER THE GATE','pen'), 1200);
      return next;
    });
  }

  function clearToday() {
    if (!confirm('Clear all of today\'s progress? Streak and day count stay intact.')) return;
    setS(prev => {
      const ns = DEF();
      ns.streak = prev.streak; ns.day = prev.day;
      ns.gateWeek = prev.gateWeek; ns.gateRoomsDone = prev.gateRoomsDone;
      ns.gateCleared = prev.gateCleared; ns.gateBroken = prev.gateBroken;
      ns.rgKey = prev.rgKey; ns.rgId = prev.rgId; ns.rgRoomsDone = prev.rgRoomsDone;
      ns.rgCleared = prev.rgCleared; ns.rgFailed = prev.rgFailed;
      ns.boss = prev.boss; ns.bossProgress = prev.bossProgress;
      return ns;
    });
    showFlash('Today cleared — fresh start, Hunter.', 'info');
  }

  function clearSave() {
    if (!confirm('Wipe all saved data and start fresh?')) return;
    localStorage.removeItem(KEY);
    localStorage.removeItem(DATE_KEY);
    window.location.reload();
  }

  function useItem(idx) {
    const item = S.inventory[idx];
    if (!item || item.used) return;
    const tierIdx = TIER_ORDER.indexOf(item.tier);
    const gateActive = isGateActiveNow();
    if (tierIdx === 0 && gateActive) { showFlash('Cannot use Common items while a Gate is active.','bad'); return; }
    if (tierIdx <= 1 && gateActive)  { showFlash('Cannot use Common or Uncommon items while a Gate is active.','bad'); return; }
    setProofItem({item, idx});
  }

  function confirmItemUse(proofText) {
    const {item, idx} = proofItem;
    const ts = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    setS(prev => {
      const ns = JSON.parse(JSON.stringify(prev));
      const it = ns.inventory[idx];
      if (!it.proofLog) it.proofLog = [];
      it.proofLog.push({note: proofText, time: ts});
      if (it.qty > 1) it.qty--;
      else it.used = true;
      return ns;
    });
    setProofItem(null);
    const cls = item.tier==='legendary'||item.tier==='epic' ? 'boss-win' : item.tier==='rare' ? 'shad' : '';
    showOverlay('[ REWARD ACTIVATED ]', item.name, proofText.toUpperCase(), 'ENJOY IT, HUNTER', cls);
  }

  function isGateActiveNow() {
    const rankLabel = getRank(S.level).label;
    const gate = GATE_RANKS[rankLabel] || GATE_RANKS['E-RANK HUNTER'];
    const cleared = S.gateWeek === getGateKey() && S.gateCleared;
    const broken  = S.gateWeek === getGateKey() && S.gateBroken;
    const gateActive = isSunday() && !cleared && !broken;
    const rgActive = S.rgKey === getRGKey() && !S.rgCleared && !S.rgFailed;
    const gateRoomsDone = S.gateRoomsDone || [];
    return (gateActive && gateRoomsDone.length < gate.rooms.length) || rgActive;
  }

  // ── Derived values ──
  const rank    = getRank(S.level);
  const need    = xpFor(S.level);
  const prev    = S.level === 1 ? 0 : xpFor(S.level - 1);
  const pct     = Math.min(100, Math.round(((S.xp - prev) / (need - prev)) * 100));
  const doneCount = DAILY_Q.filter(q => S.done[q.id]).length;
  const ch      = getDailyChallenge();
  const boss    = S.boss ? BOSS_POOL.find(b => b.id === S.boss) : null;
  const sundayNow = isSunday();

  return (
    <>
      <ProofModal
        show={!!proofItem}
        item={proofItem?.item}
        onClose={()=>setProofItem(null)}
        onConfirm={confirmItemUse}
      />

      <LootOverlay
        show={!!loot}
        item={loot?.item}
        source={loot?.source}
        onClose={()=>setLoot(null)}
      />

      <Overlay
        show={!!overlay}
        notif={overlay?.notif}
        rank={overlay?.rank}
        sub={overlay?.sub}
        btnText={overlay?.btnText}
        cls={overlay?.cls}
        onClose={closeOverlay}
      />

      <div className="frame">
        <Corners/>
        <div className="scanlines"/>
        <div className="frame-inner">

          {/* Header */}
          <div className="hdr">
            <div className="hdr-sys">◆ &nbsp; S Y S T E M &nbsp; ◆ <span className={`save-dot${saveDot?' show':''}`}/></div>
            <div className="hdr-name">HUNTER &nbsp;·&nbsp; DREW</div>
            <div className="hdr-day">DAY <span>{S.day}</span> &nbsp;&nbsp;◆&nbsp;&nbsp; ACTIVE</div>
            <div className="rank-wrap">
              <div className="rank-deco"/>
              <div className="rank-badge">{rank.label}</div>
              <div className="rank-deco r"/>
            </div>
          </div>

          {/* Stats */}
          <div className="stat-grid">
            {[{k:'str',lbl:'STR',name:'Strength'},{k:'agi',lbl:'AGI',name:'Agility'},{k:'int',lbl:'INT',name:'Intelligence'},{k:'vit',lbl:'VIT',name:'Vitality'}].map(({k,lbl,name})=>(
              <div key={k} className="stat-box">
                <div className="stat-lbl">{lbl}</div>
                <div className="stat-val">{S.stats[k]}</div>
                <div className="stat-name">{name}</div>
              </div>
            ))}
          </div>

          {/* XP Bar */}
          <div className="xp-wrap">
            <div className="xp-top"><span>EXPERIENCE POINTS</span><span>{S.xp} &nbsp;/&nbsp; {need}</span></div>
            <div className="xp-track"><div className="xp-fill" style={{width:pct+'%'}}/></div>
            <div className="xp-bot"><span>LEVEL &nbsp;{S.level}</span><span>{Math.max(0,need-S.xp)} XP TO NEXT LEVEL</span></div>
          </div>

          {/* Flash */}
          {flash && (
            <div className={`flash ${flash.type}`}>
              <i className="ti ti-info-circle" style={{fontSize:15}}/>
              <span>{flash.msg}</span>
            </div>
          )}

          {/* Daily Obligations */}
          <div className="sec req">
            <i className="ti ti-shield-bolt" style={{fontSize:16}}/>
            DAILY OBLIGATIONS
            <span className="chip">{doneCount}/4 COMPLETE</span>
            <div className="sec-line"/>
          </div>
          <div className="prog-bar"><div className="prog-fill" style={{width:Math.round((doneCount/DAILY_Q.length)*100)+'%'}}/></div>
          <div className="q-list">
            {DAILY_Q.map(q => (
              <QuestItem key={q.id} q={q} done={!!S.done[q.id]} cls="" xpCls="up" onClick={()=>toggleQuest(q)}/>
            ))}
          </div>

          {/* Bonus Quests */}
          <div className="sec bon">
            <i className="ti ti-star" style={{fontSize:16}}/>
            BONUS QUESTS
            <span className="chip">OPTIONAL · EXTRA XP</span>
            <div className="sec-line"/>
          </div>
          <div className="q-list">
            {BONUS_Q.map(q => (
              <QuestItem key={q.id} q={q} done={!!S.done[q.id]} cls="bon" xpCls="ba" onClick={()=>toggleQuest(q)}/>
            ))}
          </div>

          {/* Daily Challenge */}
          <div className="sec spec">
            <i className="ti ti-bolt" style={{fontSize:16}}/>
            DAILY CHALLENGE
            <span className="chip">RESETS AT MIDNIGHT</span>
            <div className="sec-line"/>
          </div>
          <div className="q-list">
            <div className={`q-item dc${S.challengeDone?' done':''}`} onClick={toggleChallenge}>
              <div className="q-check">{S.challengeDone && <i className="ti ti-check"/>}</div>
              <div style={{flex:1}}><div className="q-name">{ch.name}</div><div className="q-sub">{ch.sub}</div></div>
              <div className="q-xp bp">+{ch.xp} XP</div>
            </div>
          </div>

          {/* Boss Quest */}
          {boss && (
            <>
              <div className="sec boss">
                <i className="ti ti-sword" style={{fontSize:16}}/>
                BOSS QUEST
                <span className="chip">{S.bossProgress}/{boss.days} DAYS</span>
                <div className="sec-line"/>
              </div>
              <div className="q-list">
                <div className="q-item bq" onClick={progressBoss}>
                  <div className="q-check"><i className="ti ti-sword" style={{fontSize:13,color:'var(--shadow-c)'}}/></div>
                  <div style={{flex:1}}>
                    <div className="q-name">{boss.name}</div>
                    <div className="q-sub">{boss.sub}</div>
                    <div className="boss-days">PROGRESS: {S.bossProgress}/{boss.days} DAYS</div>
                    <div className="boss-prog-track"><div className="boss-prog-fill" style={{width:Math.round((S.bossProgress/boss.days)*100)+'%'}}/></div>
                  </div>
                  <div className="q-xp bs">+{boss.xp} XP</div>
                </div>
              </div>
            </>
          )}

          {/* Shadow Quests */}
          <div className="sec spec">
            <i className="ti ti-eye-off" style={{fontSize:16}}/>
            SHADOW QUESTS
            <span className="chip">HIDDEN</span>
            <div className="sec-line"/>
          </div>
          <div className="q-list">
            {SHADOW_POOL.map(sh => {
              const done = !!S.shadowDone[sh.id];
              return (
                <div key={sh.id} className={`q-item shq${done?' done':''}`}>
                  <div className="q-check">{done && <i className="ti ti-check" style={{color:'var(--purple)'}}/>}</div>
                  <div style={{flex:1}}>
                    <div className="q-name">{done ? sh.reveal : sh.name}</div>
                    <div className="q-sub">{done ? sh.rdesc : sh.sub}</div>
                  </div>
                  <div className={`q-xp ${done?'bp':'bh'}`}>{done ? '+'+sh.xp+' XP' : '??? XP'}</div>
                </div>
              );
            })}
          </div>

          <div className="div-line"/>

          {/* Violations */}
          <div className="vio-hdr">
            <i className="ti ti-skull" style={{fontSize:16}}/>
            VIOLATION LOG
            <div className="vio-hdr-line"/>
          </div>
          <div className="v-list">
            {VIOLATIONS.map(v => {
              const used = !!S.used[v.id];
              return (
                <div key={v.id} className={`v-item${used?' used':''}`} onClick={()=>!used&&triggerViolation(v)}>
                  <div className="v-ico"><i className={`ti ${v.ico}`}/></div>
                  <div style={{flex:1}}>
                    <div className="v-name">{v.name}</div>
                    <div className="v-sub">{v.sub}</div>
                  </div>
                  <div className="v-pen">{v.xp} XP</div>
                </div>
              );
            })}
          </div>

          {/* Gate */}
          <GateSection
            state={S}
            isSundayNow={sundayNow}
            onCompleteRoom={completeGateRoom}
            onDefeatBoss={defeatGateBoss}
          />

          {/* Red Gate */}
          <RedGateSection
            state={S}
            onCompleteRoom={completeRGRoom}
            onDefeatBoss={defeatRGBoss}
            onFail={failRedGate}
          />

          {/* Inventory */}
          <InventorySection
            inventory={S.inventory}
            gateActive={isGateActiveNow()}
            onUse={useItem}
          />

          {/* Footer */}
          <div className="ftr">
            <div className="streak-wrap">
              <i className="ti ti-flame" style={{fontSize:24,color:'var(--amber)'}}/>
              <div>
                <div className="streak-lbl">STREAK</div>
                <div style={{display:'flex',alignItems:'baseline',gap:8}}>
                  <div className="streak-val">{S.streak}</div>
                  <div className="streak-days">DAYS</div>
                </div>
              </div>
            </div>
            {debuff && <div className="debuff">◆ DEBUFFED ◆</div>}
            <div className="btn-row">
              <button className="btn btn-reset" onClick={clearToday}>CLEAR TODAY</button>
              <button className="btn btn-reset" onClick={clearSave}>CLEAR SAVE</button>
              <button className="btn btn-end" onClick={endDay}>END DAY</button>
            </div>
          </div>

        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
